# Fly.io config for the Amphoreus backend.
#
# This app is reachable two ways:
#   1. Fly internal 6PN: http://amphoreus.internal:8000 — used by the
#      amphoreus-frontend (same Fly org) for server-side fetches.
#   2. Public edge: https://amphoreus.fly.dev — used by external services
#      (Jacquard's virio-api) to hit the ghostwriter endpoints.
#
# Public traffic is authenticated via a shared-secret HS256 JWT — see
# ``backend/src/auth/ghostwriter_token.py``. Every public request must
# carry ``Authorization: Bearer <jwt>`` signed with GHOSTWRITER_SHARED_SECRET.
# Without that token, requests are 401'd before they reach any handler.
# Internal 6PN traffic coming from the frontend goes through the CF Access
# middleware chain unchanged (that's the browser-auth layer).
#
# State lives on a persistent volume mounted at /data. See docker-entrypoint.sh
# for how the in-image paths get wired to it.
#
# Deploy from the repo root:
#   fly deploy --config backend/fly.toml

app          = "amphoreus"
primary_region = "sjc"   # San Jose, US West

[build]
  # IMPORTANT: the dockerfile path is NOT set here because Fly resolves it
  # relative to the fly.toml directory (backend/), producing the wrong path.
  # Instead, pass --dockerfile backend/Dockerfile on the CLI:
  #   fly deploy --config backend/fly.toml --dockerfile backend/Dockerfile --remote-only
  # The build context is the repo root (flyctl's working directory).

[env]
  # Persistent state on the volume.
  VOLUME_ROOT         = "/data"
  SQLITE_PATH         = "/data/sqlite/amphoreus.db"
  DATA_DIR            = "/data/sqlite"

  # CORS — frontend is the only allowed origin. No browser reaches the backend
  # directly because there's no public HTTP handler (see [services] below:
  # force_https is off and we only listen on the internal network).
  # The frontend proxies via Next.js rewrites, so the Origin header on
  # backend-bound requests is the frontend's server-side fetch, not the browser.
  # Setting this to * is safe because the backend has no public exposure.
  ALLOWED_ORIGINS     = "*"

  # Python runtime
  PYTHONUNBUFFERED    = "1"
  LOG_LEVEL           = "info"

[[mounts]]
  source      = "amphoreus_data"
  destination = "/data"
  # initial_size set by `fly volumes create amphoreus_data --size 10`

# Public HTTP edge. Paired with shared-secret JWT auth in the middleware
# chain (see backend/src/auth/ghostwriter_token.py). Every non-internal
# request must carry Authorization: Bearer <HS256-JWT-signed-with-
# GHOSTWRITER_SHARED_SECRET> or it's 401'd before reaching any handler.
#
# Internal 6PN calls (amphoreus.internal:8000) still work in parallel —
# Fly binds both the public IP and the internal IPv6 to the same listen
# socket.
#
# auto_stop/auto_start disabled because the single-machine + persistent
# volume pattern doesn't tolerate cold starts well (SQLite open time,
# RuanMei state load, etc.). min_machines_running = 1 keeps it warm.
[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type      = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size       = "shared-cpu-2x"
  memory     = "2gb"
  cpu_kind   = "shared"
  cpus       = 2

[deploy]
  strategy = "immediate"   # single machine, no rolling — simpler with a volume

[[restart]]
  policy = "on-failure"
  retries = 3
